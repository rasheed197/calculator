<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script
      src="https://kit.fontawesome.com/20ac48ff3b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="screen">
        <div class="result-container">
          <h2 class="result">0</h2>
        </div>
        <div class="expression-container">
          <p class="expression">0</p>
        </div>
      </div>

      <div class="keypads">
        <p class="keypad">C</p>
        <p class="keypad">&divide;</p>
        <p class="keypad">%</p>
        <p class="keypad">x</p>
        <p class="keypad">7</p>
        <p class="keypad">8</p>
        <p class="keypad">9</p>
        <p class="keypad">-</p>
        <p class="keypad">4</p>
        <p class="keypad">5</p>
        <p class="keypad">6</p>
        <p class="keypad add">+</p>
        <p class="keypad">1</p>
        <p class="keypad">2</p>
        <p class="keypad">3</p>
        <p class="keypad">0</p>
        <p class="keypad point">&squf;</p>
        <p class="keypad backspace"><i class="fa-solid fa-delete-left"></i></p>
        <p class="keypad">=</p>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
